name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Python: Linting ────────────────────────────────────────────────────────
  python-lint:
    name: Python Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # astral-sh/setup-uv caches ~/.cache/uv automatically, keyed against
      # uv.lock so a lockfile change busts the cache precisely.
      - uses: astral-sh/setup-uv@v5
        with:
          enable-caching: true
          cache-dependency-glob: "uv.lock"

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Install dev dependencies
        run: uv sync --group dev

      - name: Ruff check
        run: uv run ruff check .

  # ── Python: Tests + Coverage ───────────────────────────────────────────────
  python-test:
    name: Python Tests (pytest + coverage)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-caching: true
          cache-dependency-glob: "uv.lock"

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Install dev dependencies
        run: uv sync --group dev

      - name: Run pytest with coverage
        run: uv run pytest --cov=. --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ── Frontend: Linting ──────────────────────────────────────────────────────
  frontend-lint:
    name: Frontend Lint (ESLint)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      # actions/setup-node with cache:'npm' caches ~/.npm global store, keyed
      # by cache-dependency-path so the monorepo lockfile (not root) is used.
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint
