services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    ports:
      - "5432:5432"
    volumes:
      - temporal-postgres:/var/lib/postgresql/data
    networks:
      - temporal-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 3s
      retries: 10

  temporal:
    image: temporalio/auto-setup:latest
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=postgres
    ports:
      - "7233:7233"
    networks:
      - temporal-net

  temporal-ui:
    image: temporalio/ui:latest
    depends_on:
      - temporal
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:8085
    ports:
      - "8085:8080"
    networks:
      - temporal-net

  temporal-admin-setup:
    image: temporalio/admin-tools:latest
    depends_on:
      - temporal
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    networks:
      - temporal-net
    entrypoint: ["sh", "-c", "sleep 10 && tctl --ns default namespace register || true"]
    restart: "no"

  api-gateway:
    build: .
    command: ["uv", "run", "uvicorn", "api_gateway.main:app", "--host", "0.0.0.0", "--port", "8000"]
    depends_on:
      - temporal
    env_file: .env
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    ports:
      - "8000:8000"
    volumes:
      # Live invoice PDFs / fixtures from host — no image rebuild when files change
      - ./mock_data:/app/mock_data:ro
    networks:
      - temporal-net

  ai-worker:
    build: .
    command: ["uv", "run", "python", "-m", "ai_worker.worker"]
    depends_on:
      - temporal
    env_file: .env
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    volumes:
      - ./mock_data:/app/mock_data:ro
    networks:
      - temporal-net

volumes:
  temporal-postgres:

networks:
  temporal-net:
    driver: bridge
