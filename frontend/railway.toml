# Railway service config — Next.js frontend.
#
# In the Railway dashboard, point this service's Root Directory to "/frontend"
# so Nixpacks detects package.json and the Prisma schema in the right tree.
#
# We deliberately use Nixpacks (not Dockerfile) for the frontend because:
# - It has no Dockerfile and we don't want to maintain one just for Railway.
# - Nixpacks auto-detects Next.js 16 + npm and runs `npm ci && npm run build`.
# - Prisma's "postinstall" hook generates the client during install.

[build]
builder = "NIXPACKS"
# `prisma generate` happens automatically via the postinstall hook when
# @prisma/client is in dependencies; no extra build command needed.

[deploy]
# `npm start` runs `next start` which respects $PORT (Next.js 13+ default).
startCommand = "npm start"

# Next.js serves a 200 at the root once boot is complete. If you add a
# dedicated /api/health route later, point this at it.
healthcheckPath = "/"
healthcheckTimeout = 100

restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
numReplicas = 1
