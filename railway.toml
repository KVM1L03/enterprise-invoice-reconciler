# Railway config-as-code for services using repo root ``/`` (same Dockerfile).
#
# Railway rule: values in this file *always* override the dashboard. A single
# shared ``railway.toml`` cannot carry two different ``startCommand`` values
# (api-gateway vs ai-worker), so ``startCommand`` is intentionally omitted here.
#
# Set per service in the dashboard (Deploy → Custom Start Command):
#   api-gateway: sh -c "exec uv run uvicorn api_gateway.main:app --host 0.0.0.0 --port ${PORT}"
#   ai-worker:   uv run python -m ai_worker.worker
#
# Optional: point the ai-worker service at ``railway.ai-worker.toml`` (Settings →
# config file path) so the worker start command lives in git without relying on
# the dashboard. The Next.js frontend keeps ``frontend/railway.toml``.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Health checks are not declared here — they would apply to every service using
# this file. api-gateway → set ``/docs`` under Deploy → Healthcheck in Railway.

restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
numReplicas = 1

# Persistent volume mount — create in the dashboard (Service → Volumes) at ``/app/data``.
# DATA_DIR=/app/data in env. Some plans support [[deploy.volumes]] — see Railway docs.
